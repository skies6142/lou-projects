<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/brand/monogram.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#23241B" />
    <title>Lou Projects — Award-Winning Sustainable Home Builders, Central Coast NSW</title>
    <meta
      name="description"
      content="Lou Projects build award-winning, healthy, high-performing custom and pre-designed homes on the Central Coast of NSW. Energy efficient, sustainable, built to last."
    />
    <meta property="og:title" content="Lou Projects — Sustainable Home Builders, Central Coast" />
    <meta property="og:description" content="We build award-winning, healthy, high-performing homes. Custom architectural builds and pre-designed Lou Homes." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lou-projects-northsite.netlify.app/" />
    <!-- Link-preview card: this client's own branded card -->
    <meta property="og:image" content="https://lou-projects-northsite.netlify.app/img/brand/brand-card.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://lou-projects-northsite.netlify.app/img/brand/brand-card.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Static form for Netlify build-time detection (the React form posts to it) -->
    <form name="enquiry" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="project-type" />
      <input type="text" name="location" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
